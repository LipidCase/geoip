name: Build geoip files
on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 4"
  push:
    branches:
      - master
    paths-ignore:
      - ".gitignore"
      - "LICENSE*"
      - "*.md"

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ./go.mod

      - name: Set variables
        run: |
          echo "TAG_NAME=$(date +%Y%m%d%H%M)" >> $GITHUB_ENV
          echo "RELEASE_NAME=$(date +%Y%m%d%H%M)" >> $GITHUB_ENV
        shell: bash

      - name: Fetch GeoLite2 databases from upstream release
        run: |
          mkdir -p output geolite2 upstream-release
          git clone --depth 1 --single-branch --branch release https://github.com/Loyalsoldier/geoip.git ./upstream-release

          cp ./upstream-release/GeoLite2-Country.mmdb ./output/
          cp ./upstream-release/GeoLite2-ASN.mmdb ./output/
          cp ./upstream-release/GeoLite2-Country-Blocks-IPv4.csv ./output/
          cp ./upstream-release/GeoLite2-Country-Blocks-IPv6.csv ./output/
          cp ./upstream-release/GeoLite2-Country-Locations-en.csv ./output/
          cp ./upstream-release/GeoLite2-Country-Locations-zh-CN.csv ./output/
          cp ./upstream-release/GeoLite2-ASN-Blocks-IPv4.csv ./output/
          cp ./upstream-release/GeoLite2-ASN-Blocks-IPv6.csv ./output/

          cp ./upstream-release/GeoLite2-Country-Blocks-*.csv ./geolite2/
          cp ./upstream-release/GeoLite2-Country-Locations-*.csv ./geolite2/
          cp ./upstream-release/GeoLite2-ASN-Blocks-*.csv ./geolite2/
          rm -rf ./upstream-release

      - name: Build geoip files
        run: |
          go build ./
          ./geoip convert -c ./config-cn-asn-mmdb.json

      - name: Verify mmdb files
        run: |
          cd ./output || exit 1
          go install -v github.com/maxmind/mmdbverify@latest
          for name in $(ls *.mmdb); do
            $(go env GOPATH)/bin/mmdbverify -file ${name}
          done

      - name: Generate sha256 checksum for dat files
        run: |
          cd ./output || exit 1
          for name in $(ls *.dat); do
            sha256sum ${name} > ./${name}.sha256sum
          done

      - name: Generate sha256 checksum for mmdb files
        run: |
          cd ./output || exit 1
          for name in $(ls *.mmdb); do
            sha256sum ${name} > ./${name}.sha256sum
          done

      - name: Git push assets to "release" branch
        run: |
          cd output || exit 1
          git init
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b release
          git add -A
          git commit -m "${{ env.RELEASE_NAME }}"
          git remote add geoip "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git push -f -u geoip release

      - name: Purge jsdelivr CDN
        run: |
          cd output || exit 1
          for file in $(find . -type f); do
            file="${file#./}"
            curl -i "https://purge.jsdelivr.net/gh/${{ github.repository }}@release/${file}"
          done

      - name: Remove some files to avoid publishing to GitHub release
        run: |
          cd output || exit 1
          zip -r ../cn-asn.zip ./cn-asn
          cd .. || exit 1
          rm -rf ./output/*.{gz,zip}
          rm -rf ./output/GeoLite2-*.csv
          rm -rf ./output/GeoLite2-*.mmdb
          rm -rf ./output/GeoLite2-*.sha256sum
          rm -rf ./output/{clash,dat,mrs,nginx,srs,surge,text,cn-asn}
          mv ./cn-asn.zip ./output/cn-asn.zip

      - name: Upload files to GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ env.TAG_NAME }} --title "${{ env.RELEASE_NAME }}" ./output/*
